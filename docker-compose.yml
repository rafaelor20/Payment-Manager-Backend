version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend
    command: sh -c "npm run start"
    working_dir: /usr/app
    ports:
      - ${PORT}:${PORT}
    env_file:
      - .env.dev
    depends_on:
      db:
        condition: service_started
    environment:
      DB_CONNECTION: mysql
    links:
      - db
  db:
    image: mysql:8.0
    container_name: db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
    ports:
      - 3306:${DB_PORT}
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
    driver: local
